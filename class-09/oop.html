<html>
    <head>
        <title>OOP Concepts</title>
        <script>
            class BankAccount {
                constructor(balance) {
                    this.balance = balance;
                }

                deposit(amount) {
                    this.balance += amount;
                }

                getBalance() {
                    return this.balance;
                }
            }

            const huzaifaAccount = new BankAccount(1000);
            huzaifaAccount.deposit(2500);

            console.log(huzaifaAccount.getBalance()); 
        </script>
    </head>
    <body>
        <h1>OOP Concepts</h1>
    </body>
