
 <html>
<head>
    <title>Person</title>
</head>
<body>

    <h1>Person</h1>

    <script>
        class Person {
            constructor(name) {
                this.name = name;
            }

            introduction() {
                console.log(this.name);
            }
        }

        class Student extends Person {
            study() {
                console.log("I am studying");
            }
        }

        const student = new Student("DILZAK");

        student.introduction();

        student.study();
    </script>

</body>
</html>
