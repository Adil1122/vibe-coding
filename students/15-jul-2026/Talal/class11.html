<html>
<head>
  <title>class11</title>
</head>
<body>
    <h1>
        Talal
    </h1>
    <h2>
        Inherited
    </h2>

<script>
class Person {
  constructor(name) {
    this.name = name;
  }

  introduction() {
    console.log(`My name is ${this.name}`);
  }
}

class Student extends Person {
  study() {
    console.log("I am studying");
  }
}

const student = new Student("Talal");

student.introduction();
student.study();
</script>

</body>
</html>
