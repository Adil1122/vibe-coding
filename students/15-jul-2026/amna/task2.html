<html>
    <head>
        <title>oop concept</title>
        <script>
            class person {
                intro(){
                    console.log(" i am a person");
                }
            }
            class student extends person{
                intro(){
                    console.log(" i am a student");
                }
            }
            const info=new person();
            const stud =new student();
            info.intro();
            stud.intro();
        </script>
    </head>
</html>
