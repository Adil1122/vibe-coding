<html>
    <head>
        <title>OOP Concepts</title>
        <Script>
             class person {
                introduction() {
                    console.log("My name is rukhsar");
                }
            }

            class student extends person {
                introduction() {
                    console.log("Student of SE");
                }
            }

             const Student = new student();
             const intro = new person();

            intro.introduction(); // Inherited
            Student.introduction();  // Own method
        </script>
    </head>            
    <body> 

        <h1>OOP Concepts</h1>
         
    </body>
</html>
