<html>
    <head>
        <title>OOP Concepts</title>
        <Script>
             class person {
                Intro() {
                    console.log("My name is rukhsar");
                }
            }

            class student extends person {
                Study() {
                    console.log("Student of SE");
                }
            }

             const Student = new student();

            Student.Intro(); // Inherited
            Student.Study();  // Own method
        </script>
    </head>            
    <body> 

        <h1>OOP Concepts</h1>
         
    </body>
</html>
