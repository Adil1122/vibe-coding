<html>
    <head>
        <title>oop concept</title>
        <script>
            class person {
                introduction() {
                    console.log("my name attique khan");
                }
            }

            class student extends person {
                study() {
                    console.log("i am studying");
                }
            }

            const student = new student();

            student.introduction(); // inherited
            student.study();  // own method
        </script>
     </head>
     <body>
        <h1>oop concepts</h1>
        </body>
        </html>
