<html>
    <head>
        <title>opp Concepts</title>
        <script>
            class person {
                intro () {
                    console.log("my name is ammara");
                }

            }
            class student extends person {
                study() {
         console.log("student of studty");

                }
            }
        
            const Student = new student();

            Student.intro(); // Inherited
            Student.study();  // Own method
        </script>
        <body>
        <h1>oop concepts</h1>
        </body>
    </head>
</html>
