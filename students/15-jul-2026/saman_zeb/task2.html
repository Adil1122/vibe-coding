<html> 
    <head> 
        <title>
            Inherited class
    </title>
    <script>
        class Person{
            intro(){
                console.log("I'm saman zeb ");
               
            }
        }
        
        class student extends Person{
            intro(){
                console.log("I'm student ");

            }
            
        }

    
        const info =new Person();
        const stu = new student();

        info.intro();
        stu.intro()
        
       
    </script>
    </head>
    <body>
       <h1> OOP INHERITENCE Task 2 <h1> </body>
</html>
