<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form action="#" method="post">

        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password">

        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <br><br>

        <label>Subjects:</label><br>
        <input type="checkbox" id="math" name="subjects" value="Math">
        <label for="math">Math</label><br>

        <input type="checkbox" id="science" name="subjects" value="Science">
        <label for="science">Science</label><br>

        <input type="checkbox" id="english" name="subjects" value="English">
        <label for="english">English</label>

        <br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">

        <br><br>

        <label for="favoritecolor">Favorite Color:</label>
        <input type="color" id="favoritecolor" name="favoritecolor">

        <br><br>

        <label for="marks">Marks:</label>
        <input type="range" id="marks" name="marks" min="0" max="100">

        <br><br>

        <label for="photo">Upload Photo:</label>
        <input type="file" id="photo" name="photo">

        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
