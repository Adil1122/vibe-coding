<html>
 <head> 
    <title>Forms Elements</title>
 </head>   
 <body> 
    <h1> Practice Form </h1>

    <label for ="name">First Name</label> 
    <input type="text" id="name" name="name" placeholder="Enter your name"> <br> <br> 
    <label for ="lname">Last Name</label> 
    <input type="text" id="lname" name="lname" placeholder="Enter your last name"> <br> <br> 
     <label for ="email">Email</label> 
    <input type="text" id="email" name="email" placeholder="Enter your email"> <br> <br> 
    <label for ="address">Address</label> 
    <input type="text" id="address" name="address" placeholder="Enter your address"> <br> <br>  

    <label for ='age'>Age</label>
    <input type="number" id="age" name="age" placeholder="mm/dd/yy"> <br> <br> 
    <h2> Education</h2>

    <label for ='education'>Education</label>
    <select id="education" name="education"> <br> <br> 
        <option value="highschool">High School</option>
        <option value="bachelor">Bachelor's Degree</option>
        <option value="master">Master's Degree</option>
        <option value="phd">PhD</option>
    </select><br> <br>

     <label for ="language">Language</label>
    <select id="language" name="language" size="4" multiple> <br> <br> 
        <option value="english">English</option>
        <option value="urdu">Urdu</option>
        <option value="pashto">Pashto</option>
        <option value="other">other</option>
      </select><br> <br>

      <h2>Gender</h2>
      <input list="gender">
      <datalist id="gender">
        <option value="Male">
        <option value="Female">
      </datalist> 

      <input type="submit" value="Submit"> <br> <br>

 </body>
 </html>
