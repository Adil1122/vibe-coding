<html>
    <head>
        <title>CRUD Operation</title>
        <script src="common.js"></script>
    </head>
    <body>
        <h1 style= "background-color: rgb(192, 186, 186); padding: 10px;">Employee Management</h1>

        <form>
            <label for="id">ID:</label>
            <input type="text" id="id" name="id"placeholder="
        SA-123"><br><br>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="
        Saman Zeb"><br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age"><br><br>

            <input type="button" id="submitButton" value="Add " onclick="saveEmployee()">
            <input type="button" id="updateButton" value="Update" onclick="updateEmployee()">
        </form><br>

        <h3>Employee List</h3>
        <table id="employeeTable" border="1">
            <thead>
                <tr>
                    <th style="padding: 10px;">ID</th>
                    <th style="padding: 10px;">Name</th>
                    <th style="padding: 10px;">Age</th>
                    <th style="padding: 10px;">Action</th>
                </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
        </table>
    </body>
</html>
