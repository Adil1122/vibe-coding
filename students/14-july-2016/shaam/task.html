<html>
    <head>
        <title>OOP Concepts</title>

        <script>
            class Student {
                constructor(name, age) {
                    this.name = name;
                    this.age = age;
                }

                getName() {
                    return this.name;
                }

                getAge() {
                    return this.age;
                }

                setName(name) {
                    this.name = name;
                }

                setAge(age) {
                    this.age = age;
                }
            }

            const student1 = new Student("ehtisham;", 22);

            student1.setName("ehtisham");
            student1.setAge(22);

            console.log(" Name:", student1.getName());
            console.log(" Age:", student1.getAge());

            const student2 = new Student("Ali;", 20);

            student2.setName("Ali");
            student2.setAge(20);

            console.log(" Name:", student2.getName());
            console.log(" Age:", student2.getAge());

            const student3 = new Student("ahmad;", 18);

            student3.setName("ahmad");
            student3.setAge(18);

            console.log(" Name:", student3.getName());
            console.log(" Age:", student3.getAge());

            const student4 = new Student("hammad;", 25);

            student4.setName("hammad");
            student4.setAge(25);

            console.log(" Name:", student4.getName());
            console.log(" Age:", student4.getAge());
                    
        </script>
    </head>

    <body>
        <h1>OOP Concepts - Student(1 to 4) Class</h1>
    </body>
</html>
