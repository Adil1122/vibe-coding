<html>
    <head>
        <title>OOP Concepts</title>
        <script>
            class Students {
                constructor(name, age) {
                    this.name = name;
                    this.age = age;
                }

                getName() {
                    return this.name;
                }

                getAge() {
                    return this.age;
                }

                setName(name) {
                    this.name = name;
                }

                setAge(age) {
                    this.age = age;
                }
            }

            const student_1 = new Students("Student One", 20);
            console.log(student_1.getName());
            console.log(student_1.getAge());

            student_1.setName("Hassan1");
            student_1.setAge(17);

            console.log(student_1.getName());
            console.log(student_1.getAge());


            const student_2 = new Students("Student Two", 20);
            console.log(student_2.getName());
            console.log(student_2.getAge());

            student_2.setName("Mustafa");
            student_2.setAge(18);

            console.log(student_2.getName());
            console.log(student_2.getAge());


            const student_3 = new Students("Student Three", 20);
            console.log(student_3.getName());
            console.log(student_3.getAge());

            student_3.setName("Hassan");
            student_3.setAge(16);

            console.log(student_3.getName());
            console.log(student_3.getAge());


            const student_4 = new Students("Student Four", 20);
            console.log(student_4.getName());
            console.log(student_4.getAge());

            student_4.setName("Hasnat");
            student_4.setAge(19);

            console.log(student_4.getName());
            console.log(student_4.getAge());
            
        </script>
    </head>
    <body>
        <h1>OOP Concepts</h1>
    </body>
</html>
