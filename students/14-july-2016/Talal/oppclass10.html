   <html>
<head>
    <title>OOP Concepts</title>

    <script>
    
        class Students {
            constructor(name, age) {
                this.name = name;
                this.age = age;
            }

        
            getName() {
                return this.name;
            }

            getAge() {
                return this.age;
            }

        
            setName(name) {
                this.name = name;
            }

            setAge(age) {
                this.age = age;
            }
        }

    
        const student_1 = new Students("Student One", 20);
        const student_2 = new Students("Student Two", 21);
        const student_3 = new Students("Student Three", 22);
        const student_4 = new Students("Student Four", 23);

    
        console.log("Student 1:");
        console.log(student_1.getName());
        console.log(student_1.getAge());

        console.log("Student 2:");
        console.log(student_2.getName());
        console.log(student_2.getAge());

        console.log("Student 3:");
        console.log(student_3.getName());
        console.log(student_3.getAge());

        console.log("Student 4:");
        console.log(student_4.getName());
        console.log(student_4.getAge());

    
        student_1.setName("Talal");
        student_1.setAge(20);

        student_2.setName("Ahmed");
        student_2.setAge(25);

        student_3.setName("Jamal");
        student_3.setAge(23);

        student_4.setName("ERNEST");
        student_4.setAge(26);

        console.log("Updated Student 1:");
        console.log(student_1.getName());
        console.log(student_1.getAge());

        console.log("Updated Student 2:");
        console.log(student_2.getName());
        console.log(student_2.getAge());

        console.log("Updated Student 3:");
        console.log(student_3.getName());
        console.log(student_3.getAge());

        console.log("Updated Student 4:");
        console.log(student_4.getName());
        console.log(student_4.getAge());

    </script>
</head>

<body>
    <h1>OOP Concepts</h1>
</body>
</html>
