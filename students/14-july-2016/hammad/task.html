<html>
    <head>
        <title>oopconcept</title>

        <script>


 class Student {
                constructor(name, age) {
                    this.name = name;
                    this.age = age;
                }

                getName() {
                    return this.name;
                }

                getAge() {
                    return this.age;
                }

                setName(name) {
                    this.name = name;
                }

                setAge(age) {
                    this.age = age;

                } getName() {
                    return this.name;
                }
                

                
            }

            const student1 = new Student("umer;", 20);

            student1.setName("umer");
            student1.setAge(20);

            console.log(" Name:", student1.getName());
            console.log(" Age:", student1.getAge());  

            
            const student2 = new Student("hassan;", 30);

            student2.setName("hassan");
            student2.setAge(30);

            console.log(" Name:", student2.getName());
            console.log(" Age:", student2.getAge());  
         

            const student3 = new Student("Hammad;", 22);

            student3.setName("Hamad");
            student3.setAge(22);

            console.log(" Name:", student3.getName());
            console.log(" Age:", student3.getAge());
            
              const student4 = new Student("ali;", 25);

            student4.setName("ali");
            student4.setAge(25);

            console.log(" Name:", student4.getName());
            console.log(" Age:", student4.getAge());

            </script>
         </head>

         <body>
            <h1>OOP CONCEPT - Student(1to4)</h1>
         </body>
</html>
