<html>
    <head>
        <title>JavaScript function practice</title>
        <script>
            function subtractnumbers(num1 , num2) {
                 return num1 - num2;
            }

            function multiplynumbers(num1 , num2) {
                return num1 * num2;
            }

            function dividenumbers(num1 , num2) {
                return num1 / num2;
            }

             function subtraction() {
                let num1 = parseFloat(document.getElementById("num1").value); 
                let num2 = parseFloat(document.getElementById("num2").value);
                let result = subtractnumbers(num1, num2);
                document.getElementById("result").innerHTML = "The subtraction is:" + result;
            }

            function multiplication() {
                let num1 = parseFloat(document.getElementById("num1").value); 
                let num2 = parseFloat(document.getElementById("num2").value);
                let result = multiplynumbers(num1, num2);
                document.getElementById("result").innerHTML = "The multiplication is:" + result;
            }

               function division() {
                let num1 = parseFloat(document.getElementById("num1").value); 
                let num2 = parseFloat(document.getElementById("num2").value);
                let result = dividenumbers(num1, num2);
                document.getElementById("result").innerHTML = "The division is:" + result;
            }
        </script>
    </head>
    <body>
        <h1>calculator functions in JavaScript</h1>

        <form>
            <label for="num1">Number 1:</label>
            <input type="number" id="num1" name="num1"><br></br>

            <label for="num2">Number 2:</label>
            <input type="number" id="num2" name="num2"><br></br>

            <input type="button" value="Subtract Numbers" onclick="subtraction()">
            <input type="button" value="Multiply Numbers" onclick="multiplication()">
            <input type="button" value="Divide Numbers" onclick="division()">
        </form>
        <p id="result"></p>
    </body>
</html>
