<html>
    <head>
        <title>Oops concepts</title>
        <script>
            class student {
                contructor(name,age){
                    this.name = name;
                    this.age = age;
                }
               
                set(name,age) {
                    this.name = name;
                       this.age = age;
                }

                 getname(){
                    return this.name;
                }

                 getage(){
                    return this.age;
                }
            
            
            }
            let details = new student('saman', 22);
            details.set('saman',22);
            
          
 
            console.log(details.getname());
             console.log(details.getage());          
        </script>
        </head>

        <body>
            <h1>oop conceps</h1>
        </body>
</html>
