<html>

        <title>student info</title>
        <script>
            class student {
                contructor(name,age){
                    this.name = name;
                    this.age = age;
                }

                getname(){
                    return this.name;
                }

                getage(){
                    return this.age;
                }

                setname(name) {
                    this.name = name;
                }

                setage(age) {
                    this.age = age;
                }
            }

            let stu = new student('ammara', 19)

            //alert(stu)
            stu.setname('Ali')
            stu.setage(40)
            console.log(stu.getname())
            console.log(stu.getage())
        </script>
