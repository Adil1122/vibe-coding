<html>
    <head>
        <title>OOP Concepts</title>
        <Script>
            class Student {
                constructor(name, age) {
                this.name = name;
                this.age = age
                }

                getname(){
                    return this.name;
                }

                getage(){
                    return this.age;
                }

                setname(name) {
                    this.name = name;
                }

                setage(age) {
                    this.age = age;
                }
            }

            let stu = new Student('Amal', 20)

            
            stu.setname('Zimal')
            stu.setage(22)
            console.log(stu.getname())
            console.log(stu.getage())
        </script>
        </head>

        <body>
            <h1>OOP Concepts Practice</h1>
        </body>
</html>
