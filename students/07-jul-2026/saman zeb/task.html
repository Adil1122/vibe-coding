<html> 
    <head>
        <title>Language Task</title>
    </head>
    <script>
        console.log('1.Negative/Positive');
        let num = -15;
        if(num < 0) {
            console.log(num + ' is a negative number');
        } else if(num > 0) {
            console.log(num + ' is a positive number');
        } else {
            console.log(num + ' is zero');
        }

        console.log('2.Largest Number among three');
        let a = 10, b = 20, c = 15;
        if(a >= b && a >= c) {
            console.log('largest number is  '+a);
        } else if(b >= a && b >= c) {
            console.log('largest number is  '+b);
        } else {
            console.log('largest number is  '+c);
        }

        console.log('4.Even ');
        for(let i=20; i<=80; i+=2){
            console.log(i + ' is an even number');
        }

        console.log('4.Odd ');
          for(let i=21; i<80; i+=2){
            console.log(i + ' is an odd number');
        }

        console.log('3.Numbers divisible by 3');
        for(let i=1; i<=100; i++){
            if(i % 3 == 0){
                console.log(i + ' is divisible by 3');
            }
        }

         console.log('5.Even numbers from 100 to 1 in reverse order');
         for(let i=100; i>1; i-=2){
                console.log(i + ' is an even number');
         }
    </script>
